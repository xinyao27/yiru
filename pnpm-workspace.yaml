cleanupUnusedCatalogs: false
# Why: internal package versions also come through catalogs; matching workspace
# packages must still resolve to local source instead of the registry.
linkWorkspacePackages: true
# Why: pnpm 11 requires an explicit decision for every dependency install
# script; only packages that produce required native/runtime artifacts run.
allowBuilds:
  '@parcel/watcher': true
  agent-browser: true
  cpu-features: true
  electron-winstaller: true
  esbuild: true
  msw: false
  node-pty: true
  sherpa-onnx: true
  ssh2: false
overrides:
  # Why: the latest published test adapter still declares the 0.1 core, whose
  # JavaScript plugin enum is incompatible with Vite+ 0.2's native binding.
  '@voidzero-dev/vite-plus-test>@voidzero-dev/vite-plus-core': 'catalog:'
  monaco-editor>dompurify: catalog:overrides
  vite: 'catalog:'
  vitest: 'catalog:'
patchedDependencies:
  '@pierre/diffs@1.2.12': apps/desktop/config/patches/@pierre__diffs@1.2.12.patch
  # Why: the currently published Vite+ test alias ships its CLI but omits the
  # vitest bin metadata that `vp test` resolves.
  '@voidzero-dev/vite-plus-test@0.1.24': apps/desktop/config/patches/@voidzero-dev__vite-plus-test@0.1.24.patch
  '@xterm/addon-ligatures@0.11.0-beta.287': apps/desktop/config/patches/@xterm__addon-ligatures@0.11.0-beta.287.patch
  '@xterm/addon-serialize@0.15.0-beta.287': apps/desktop/config/patches/@xterm__addon-serialize@0.15.0-beta.287.patch
  '@xterm/addon-webgl@0.20.0-beta.286': apps/desktop/config/patches/@xterm__addon-webgl@0.20.0-beta.286.patch
  node-pty@1.1.0: apps/desktop/config/patches/node-pty@1.1.0.patch
peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: '*'
    vitest: '*'
supportedArchitectures:
  cpu:
    - current
    - x64
    - arm64
  os:
    - current
    - darwin
    - linux
    - win32
# Why: this explicitly requested package is exact-pinned while it is newer than the supply-chain age gate.
minimumReleaseAgeExclude:
  - thinking-orbs@0.1.1
